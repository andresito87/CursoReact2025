<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Teslo favicon XL">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#13151B"/>
      <stop offset="100%" stop-color="#06070A"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6670"/>
      <stop offset="100%" stop-color="#FF2638"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="58%" stop-color="#EEF1F5"/>
      <stop offset="100%" stop-color="#C3CAD3"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.15" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Bigger background so the icon reads larger in the browser tab -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="15" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="61" height="61" rx="15" fill="none" stroke="#2B313B" stroke-width="1"/>

  <!-- Bag handle -->
  <path d="M16.5 18.2Q32 4.8 47.5 18.2" fill="none" stroke="url(#red)" stroke-width="5.2" stroke-linecap="round"/>

  <!-- Bag body, pushed closer to edges -->
  <path d="M11.5 22.3V48.5Q11.5 54 17 54H47Q52.5 54 52.5 48.5V22.3" fill="none" stroke="url(#red)" stroke-width="4.2" stroke-linecap="round"/>

  <!-- Central T, larger and higher contrast -->
  <g filter="url(#shadow)">
    <path d="M16.8 24.2C21.8 20.8 27.9 18.9 32 18.9c4.1 0 10.2 1.9 15.2 5.3l-2.6 5.2c-3.8-1.8-8-2.6-12.6-2.6s-8.8.8-12.6 2.6z" fill="url(#metal)"/>
    <path d="M23.7 28.9c3 .6 5.5 2.2 8.3 5.5 2.8-3.3 5.3-4.9 8.3-5.5l-5.7 24.3h-5.2z" fill="url(#metal)"/>
  </g>
</svg>
